# Optional remote-management example. The default deployment does not need SSH.
services:
  mihomo-manager:
    environment:
      MIHOMO_MODE: remote
      MIHOMO_AUTH: key
      MIHOMO_KEY_FILE: /run/secrets/mihomo_ssh_key
      MIHOMO_HOST: ${MIHOMO_HOST:?Set MIHOMO_HOST}
      MIHOMO_SSH_PORT: ${MIHOMO_SSH_PORT:-22}
      MIHOMO_USER: ${MIHOMO_USER:-root}
    volumes:
      - ${MIHOMO_KEY_PATH:?Set MIHOMO_KEY_PATH for remote SSH key mode}:/run/secrets/mihomo_ssh_key:ro
