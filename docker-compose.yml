services:
  mihomo-manager:
    build:
      context: .
    container_name: mihomo-manager-webui
    restart: unless-stopped
    init: true
    pid: host
    privileged: true
    ports:
      - "${MIHOMO_MANAGER_BIND:-127.0.0.1}:5178:5178"
    environment:
      NODE_ENV: production
      LISTEN_HOST: 0.0.0.0
      PORT: 5178
      DATA_DIR: /app/data
      MIHOMO_MANAGER_HOST_PROJECT_DIR: ${MIHOMO_MANAGER_HOST_PROJECT_DIR:-/data/mihomo-manager-webui}
      AUTH_ALLOW_REGISTRATION: ${AUTH_ALLOW_REGISTRATION:-}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-24}
      COOKIE_SECURE: ${COOKIE_SECURE:-}
    volumes:
      - ./data:/app/data
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5178/api/auth/status').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
