services:
  mihomo-manager:
    build:
      context: .
    container_name: mihomo-manager-webui
    restart: unless-stopped
    init: true
    ports:
      - "${MIHOMO_BIND:-127.0.0.1}:5178:5178"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      LISTEN_HOST: 0.0.0.0
      PORT: 5178
      SERVER_CONFIG_FILE: /app/data/server.config.json
      MIHOMO_MODE: ${MIHOMO_MODE:-}
      MIHOMO_AUTH: ${MIHOMO_AUTH:-}
      MIHOMO_HOST: ${MIHOMO_HOST:-}
      MIHOMO_SSH_PORT: ${MIHOMO_SSH_PORT:-22}
      MIHOMO_USER: ${MIHOMO_USER:-root}
      MIHOMO_PASSWORD: ${MIHOMO_PASSWORD:-}
    volumes:
      - ./data:/app/data
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5178/api/config').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
